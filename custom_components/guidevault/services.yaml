command:
  name: Send command
  description: Send a raw GuideVault command payload.
  fields:
    entry_id:
      name: Entry ID
      description: Optional Home Assistant config entry ID when multiple GuideVault instances are configured.
      required: false
      selector:
        text:
    action:
      name: Action
      description: GuideVault REST action.
      required: false
      selector:
        text:
    command_action:
      name: Command action
      description: Backward-compatible alias for action.
      required: false
      selector:
        text:
    item_title:
      name: Item title
      description: Title of the manual, strategy guide, or magazine to open.
      required: false
      selector:
        text:
    item_kind:
      name: Item kind
      description: GuideVault item kind.
      required: false
      selector:
        select:
          options:
            - auto
            - manual
            - strategyGuide
            - strategy_guide
            - strategy-guide
            - magazine
    issue_number:
      name: Issue number
      description: Magazine issue number.
      required: false
      selector:
        text:
    volume:
      name: Volume
      description: Magazine volume.
      required: false
      selector:
        text:
    page:
      name: Page
      description: Page number.
      required: false
      selector:
        number:
          mode: box
    zoom:
      name: Zoom
      description: Reader zoom level.
      required: false
      selector:
        number:
          mode: box
          step: 0.1
    display_mode:
      name: Display mode
      description: Reader display mode.
      required: false
      selector:
        select:
          options:
            - 1 page
            - 2 page
            - 2 page adaptive
    background:
      name: Background
      description: Reader background name or value.
      required: false
      selector:
        text:
    background_brightness:
      name: Background brightness
      description: Reader background brightness.
      required: false
      selector:
        number:
          mode: slider
          min: 0
          max: 100
    fullscreen:
      name: Fullscreen
      description: Optional fullscreen value when supported by GuideVault.
      required: false
      selector:
        boolean:
    payload:
      name: Extra payload
      description: Additional raw JSON fields to merge into the command payload.
      required: false
      selector:
        object:

open_item:
  name: Open item
  description: Open a manual, strategy guide, or magazine in GuideVault.
  fields:
    entry_id:
      name: Entry ID
      required: false
      selector:
        text:
    item_title:
      name: Item title
      required: true
      selector:
        text:
    item_kind:
      name: Item kind
      required: false
      default: auto
      selector:
        select:
          options:
            - auto
            - manual
            - strategyGuide
            - strategy_guide
            - strategy-guide
            - magazine
    issue_number:
      name: Issue number
      description: Magazine issue number.
      required: false
      selector:
        text:
    volume:
      name: Volume
      description: Magazine volume.
      required: false
      selector:
        text:
    page:
      name: Page
      required: false
      selector:
        number:
          mode: box

next_page:
  name: Next page
  description: Turn to the next page in the active GuideVault reader.
  fields:
    entry_id:
      name: Entry ID
      required: false
      selector:
        text:

previous_page:
  name: Previous page
  description: Turn to the previous page in the active GuideVault reader.
  fields:
    entry_id:
      name: Entry ID
      required: false
      selector:
        text:

first_page:
  name: First page
  description: Jump to the first page in the active GuideVault reader.
  fields:
    entry_id:
      name: Entry ID
      required: false
      selector:
        text:

last_page:
  name: Last page
  description: Jump to the last page in the active GuideVault reader.
  fields:
    entry_id:
      name: Entry ID
      required: false
      selector:
        text:

go_to_page:
  name: Go to page
  description: Jump to a specific page in the active GuideVault reader.
  fields:
    entry_id:
      name: Entry ID
      required: false
      selector:
        text:
    page:
      name: Page
      required: true
      selector:
        number:
          mode: box

fullscreen:
  name: Focus fullscreen
  description: Focus the GuideVault reader into the app-level fullscreen layout. This does not force browser-native fullscreen.
  fields:
    entry_id:
      name: Entry ID
      required: false
      selector:
        text:


set_background:
  name: Set background
  description: Set the active GuideVault reader background.
  fields:
    entry_id:
      name: Entry ID
      required: false
      selector:
        text:
    background:
      name: Background
      required: true
      selector:
        text:

set_background_brightness:
  name: Set background brightness
  description: Set the active GuideVault reader background brightness.
  fields:
    entry_id:
      name: Entry ID
      required: false
      selector:
        text:
    background_brightness:
      name: Background brightness
      required: true
