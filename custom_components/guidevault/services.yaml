command:
  name: Send command
  description: Send a raw command payload to GuideVault.
  fields:
    entry_id:
      name: Entry ID
      description: Optional Home Assistant config entry ID when multiple GuideVault instances are configured.
      required: false
      selector:
        text:
    command_action:
      name: Command action
      description: GuideVault command action, such as open, page_next, page_previous, page_first, page_last, toggle_fullscreen, set_background, or close.
      required: true
      selector:
        text:
    item_title:
      name: Item title
      description: Title of the manual, strategy guide, or magazine to open.
      required: false
      selector:
        text:
    content_type:
      name: Content type
      description: Optional content type hint.
      required: false
      selector:
        select:
          options:
            - auto
            - manual
            - strategy_guide
            - strategy-guide
            - magazine
    issue:
      name: Issue
      description: Magazine issue number or issue text.
      required: false
      selector:
        text:
    volume:
      name: Volume
      description: Magazine volume.
      required: false
      selector:
        text:
    page:
      name: Page
      description: Page number.
      required: false
      selector:
        number:
          min: 1
          mode: box
    background:
      name: Background
      description: Background name or value for GuideVault.
      required: false
      selector:
        text:
    fullscreen:
      name: Fullscreen
      description: Fullscreen toggle value when supported by GuideVault.
      required: false
      selector:
        boolean:
    payload:
      name: Extra payload
      description: Additional raw JSON fields to merge into the command payload.
      required: false
      selector:
        object:

open_item:
  name: Open item
  description: Open a manual, strategy guide, or magazine in GuideVault.
  fields:
    entry_id:
      name: Entry ID
      required: false
      selector:
        text:
    item_title:
      name: Item title
      required: true
      selector:
        text:
    content_type:
      name: Content type
      required: false
      default: auto
      selector:
        select:
          options:
            - auto
            - manual
            - strategy_guide
            - strategy-guide
            - magazine
    issue:
      name: Issue
      description: Magazine issue number or issue text.
      required: false
      selector:
        text:
    volume:
      name: Volume
      description: Magazine volume.
      required: false
      selector:
        text:

next_page:
  name: Next page
  description: Turn to the next page in the active GuideVault reader.
  fields:
    entry_id:
      name: Entry ID
      required: false
      selector:
        text:

previous_page:
  name: Previous page
  description: Turn to the previous page in the active GuideVault reader.
  fields:
    entry_id:
      name: Entry ID
      required: false
      selector:
        text:

first_page:
  name: First page
  description: Jump to the first page in the active GuideVault reader.
  fields:
    entry_id:
      name: Entry ID
      required: false
      selector:
        text:

last_page:
  name: Last page
  description: Jump to the last page in the active GuideVault reader.
  fields:
    entry_id:
      name: Entry ID
      required: false
      selector:
        text:

go_to_page:
  name: Go to page
  description: Jump to a specific page in the active GuideVault reader.
  fields:
    entry_id:
      name: Entry ID
      required: false
      selector:
        text:
    page:
      name: Page
      required: true
      selector:
        number:
          min: 1
          mode: box

toggle_fullscreen:
  name: Toggle fullscreen
  description: Toggle fullscreen mode in GuideVault.
  fields:
    entry_id:
      name: Entry ID
      required: false
      selector:
        text:

set_background:
  name: Set background
  description: Set the active GuideVault reader background.
  fields:
    entry_id:
      name: Entry ID
      required: false
      selector:
        text:
    background:
      name: Background
      required: true
      selector:
        text:

close_reader:
  name: Close reader
  description: Close the active GuideVault reader when supported by GuideVault.
  fields:
    entry_id:
      name: Entry ID
      required: false
      selector:
        text:
