command:
  name: Send command
  description: Queue a raw GuideVault reader command.
  fields:
    action:
      required: true
      example: toggle_fullscreen
      selector:
        text:
    item_title:
      required: false
      example: Super Mario 64
      selector:
        text:
    item_kind:
      required: false
      example: Manual
      selector:
        select:
          options:
            - Manual
            - Strategy Guide
            - Magazine
    issue_number:
      required: false
      selector:
        text:
    volume:
      required: false
      selector:
        text:
    page:
      required: false
      selector:
        number:
          min: 0
          max: 9999
          mode: box
    zoom:
      required: false
      selector:
        number:
          min: 70
          max: 145
          mode: slider
    display_mode:
      required: false
      selector:
        select:
          options:
            - single_page
            - two_page
            - adaptive_two_page
    background:
      required: false
      selector:
        text:
    background_brightness:
      required: false
      selector:
        number:
          min: 15
          max: 100
          mode: slider

open_item:
  name: Open item
  description: Open a GuideVault manual, strategy guide, or magazine in the reader.
  fields:
    item_title:
      required: true
      example: Super Mario 64
      selector:
        text:
    item_kind:
      required: false
      example: Manual
      selector:
        select:
          options:
            - Manual
            - Strategy Guide
            - Magazine
    issue_number:
      required: false
      selector:
        text:
    volume:
      required: false
      selector:
        text:
