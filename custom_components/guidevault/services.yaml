status:
  name: Refresh status
  description: Refresh GuideVault status sensors.
  fields:
    entry_id:
      name: Entry ID
      required: false
      selector:
        text:

command:
  name: Send command
  description: Send a raw GuideVault command payload.
  fields:
    entry_id:
      name: Entry ID
      required: false
      selector:
        text:
    action:
      name: Action
      description: GuideVault REST action.
      required: true
      selector:
        select:
          custom_value: true
          options:
            - status
            - open
            - open_manual
            - open_strategy_guide
            - open_magazine
            - next_page
            - previous_page
            - first_page
            - last_page
            - set_page
            - zoom_in
            - zoom_out
            - set_zoom
            - set_display_mode
            - toggle_overlay
            - set_background
            - set_background_brightness
            - close_reader
    item_title:
      name: Item title
      required: false
      selector:
        text:
    item_kind:
      name: Item kind
      required: false
      selector:
        select:
          options:
            - auto
            - manual
            - strategyGuide
            - magazine
    issue_number:
      name: Issue number
      required: false
      selector:
        text:
    volume:
      name: Volume
      required: false
      selector:
        text:
    page:
      name: Page
      required: false
      selector:
        number:
          mode: box
    zoom:
      name: Zoom
      required: false
      selector:
        number:
          mode: box
          step: 0.1
    display_mode:
      name: Display mode
      required: false
      selector:
        select:
          options:
            - 1 page
            - 2 page
            - 2 page adaptive
    background:
      name: Background
      required: false
      selector:
        text:
    background_brightness:
      name: Background brightness
      required: false
      selector:
        number:
          mode: slider
          min: 0
          max: 100
    payload:
      name: Extra payload
      required: false
      selector:
        object:

open_item:
  name: Open item
  description: Open a GuideVault item using the correct open action for the selected item kind.
  fields:
    item_title:
      name: Item title
      required: true
      selector:
        text:
    item_kind:
      name: Item kind
      required: false
      default: auto
      selector:
        select:
          options:
            - auto
            - manual
            - strategyGuide
            - magazine
    issue_number:
      name: Issue number
      required: false
      selector:
        text:
    volume:
      name: Volume
      required: false
      selector:
        text:
    page:
      name: Page
      required: false
      selector:
        number:
          mode: box
    entry_id:
      name: Entry ID
      required: false
      selector:
        text:

