type: grid
columns: 4
square: false
cards:
  - type: button
    name: First
    icon: mdi:page-first
    tap_action:
      action: call-service
      service: guidevault.first_page
  - type: button
    name: Prev
    icon: mdi:chevron-left
    tap_action:
      action: call-service
      service: guidevault.previous_page
  - type: button
    name: Next
    icon: mdi:chevron-right
    tap_action:
      action: call-service
      service: guidevault.next_page
  - type: button
    name: Last
    icon: mdi:page-last
    tap_action:
      action: call-service
      service: guidevault.last_page
  - type: button
    name: Overlay
    icon: mdi:eye-outline
    tap_action:
      action: call-service
      service: guidevault.toggle_overlay
  - type: button
    name: Close
    icon: mdi:close-box-outline
    tap_action:
      action: call-service
      service: guidevault.close_reader
  - type: button
    name: Zoom -
    icon: mdi:magnify-minus-outline
    tap_action:
      action: call-service
      service: guidevault.zoom_out
  - type: button
    name: Zoom +
    icon: mdi:magnify-plus-outline
    tap_action:
      action: call-service
      service: guidevault.zoom_in
